<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios Desafío 2</title>
    <link rel="stylesheet" href="./Style/style/style.css">
</head>
<body>
    <section>
        
        <h1>EJERCICIO N° 1</h1>
        <div class="img">
            <img width="300px" src="./Style/images/ivanchuk-carlsen-maria-emelianova-2.webp" alt="" id="imgBordes"
            onclick="
            let imagen = document.querySelector('#imgBordes')
            if(imagen.style.border == 'none'){
                imagen.style.border = '2px solid red'
                imagen.style.borderRadius = '50%'
            }else{
                imagen.style.border='none'
                imagen.style.borderRadius = '0%'
            }
            "
            >
        </div>
    </section>

    <section>
        <h1>EJERCICIO N° 2</h1>
        <div class="contenedor-general">
            <div class="contenedor-stickers">
                <div class="item-stickers">
                    <img class="img-stickers" src="./Style/images/stickers-1.jpg" alt="stickers">
                    <input type="number" id="num1" value="0">
                </div>
                <div class="item-stickers">
                    <img class="img-stickers" src="./Style/images/stickers-2.png" alt="stickers">
                    <input type="number" id="num2" value="0">
                </div>
                <div class="item-stickers">
                    <img class="img-stickers" src="./Style/images/stickers-3.jpg" alt="stickers">
                    <input type="number" id="num3" value="0">
                </div>
            </div>    
            <div class="cont-2">
                <p id="mensaje">Puedes llevar hasta 10 stickers en total</p>
                <button id="btnVerificar" onclick="
                let input1 = document.querySelector('#num1').value;
                let input2 = document.querySelector('#num2').value;
                let input3 = document.querySelector('#num3').value;

                let total = Number(input1) + Number(input2) + Number(input3);

                let msg = document.querySelector('#mensaje');

                if(total>10){
                    msg.innerHTML = 'Llevas demasiados stickers';
                }else{
                    msg.innerHTML = 'Llevas ' + total + ' stickers';
                }

                ">Verificar</button>
            </div>       
        </div>
     
    </section>

    <section class="contenedor-general">
        <h1>EJERCICIO N°3</h1>
        <h3>Ingresa el Password</h3>
        <div class="selectores">
            <select id="select1">
                <option numero="1">1</option>
                <option numero="2">2</option>
                <option numero="3">3</option>
                <option numero="4">4</option>
                <option numero="5">5</option>
                <option numero="6">6</option>
                <option numero="7">7</option>
                <option numero="8">8</option>
                <option numero="9">9</option>
                </select>
            
            <select id="select2">
                <option numero="1">1</option>
                <option numero="2">2</option>
                <option numero="3">3</option>
                <option numero="4">4</option>
                <option numero="5">5</option>
                <option numero="6">6</option>
                <option numero="7">7</option>
                <option numero="8">8</option>
                <option numero="9">9</option>
            </select>
            
            <select id="select3">
                <option numero="1">1</option>
                <option numero="2">2</option>
                <option numero="3">3</option>
                <option numero="4">4</option>
                <option numero="5">5</option>
                <option numero="6">6</option>
                <option numero="7">7</option>
                <option numero="8">8</option>
                <option numero="9">9</option>
            </select>
        </div>

        <button id="btnIngresar" onclick="
            let num1 = document.querySelector('#select1').value;
            let num2 = document.querySelector('#select2').value;
            let num3 = document.querySelector('#select3').value;
            let password = num1 + num2 + num3;
            let mensaje = document.querySelector('#resultado-pass');

            if (password === '911') {
                mensaje.innerHTML = 'Password 1 correcto';
                mensaje.style.color = 'green';
            } else if (password === '714') {
                mensaje.innerHTML = 'Password 2 correcto';
                mensaje.style.color = 'green';
            } else {
                mensaje.innerHTML = 'Password incorrecto';
                mensaje.style.color = 'red';
            }
        ">Ingresar</button>

        <p id="resultado-pass"></p>
    </section>
    
   
</body>
</html>
